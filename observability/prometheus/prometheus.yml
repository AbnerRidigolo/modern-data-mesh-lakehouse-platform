# Configuração de scrape do Prometheus para a plataforma Data Mesh.
# Coleta as métricas expostas pela API (prometheus-fastapi-instrumentator em
# /metrics) e a saúde do broker Redpanda (endpoint admin em :9644).
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: enterprise-data-mesh

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # API FastAPI (DaaS Gateway): latência, throughput, in-progress por handler
  - job_name: daas-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: daas-api

  # Redpanda: métricas públicas do broker (throughput, partições, lag interno)
  - job_name: redpanda
    metrics_path: /public_metrics
    static_configs:
      - targets: ["redpanda:9644"]
        labels:
          service: streaming-broker
