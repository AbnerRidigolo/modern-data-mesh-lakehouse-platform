# Streaming tier: Redpanda (broker compatível com Kafka) + producer/consumer do
# clickstream de marketing. O producer simula eventos de mídia em tempo real; o
# consumer valida contra o contrato e micro-batcha no Delta Lake (MinIO).
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  labels:
    app.kubernetes.io/name: redpanda
spec:
  selector:
    app.kubernetes.io/name: redpanda
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
    - name: admin
      port: 9644
      targetPort: 9644
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  labels:
    app.kubernetes.io/name: redpanda
spec:
  serviceName: redpanda
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redpanda
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redpanda
    spec:
      containers:
        - name: redpanda
          image: redpandadata/redpanda:v24.2.7
          args:
            - redpanda
            - start
            - --overprovisioned
            - --smp=1
            - --memory=1G
            - --reserve-memory=0M
            - --node-id=0
            - --check=false
            - --kafka-addr=PLAINTEXT://0.0.0.0:9092
            - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
          ports:
            - containerPort: 9092
            - containerPort: 9644
          volumeMounts:
            - name: data
              mountPath: /var/lib/redpanda/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "rpk cluster health | grep -q 'Healthy:.*true'"]
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 25
            periodSeconds: 15
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1200Mi" }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 3Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-producer
  labels:
    app.kubernetes.io/name: stream-producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: stream-producer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stream-producer
    spec:
      containers:
        - name: producer
          image: data-mesh/airflow:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "domains.streaming.producer", "--rate", "5"]
          workingDir: /opt/airflow
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "redpanda:9092"
            - name: PYTHONPATH
              value: "/opt/airflow"
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { cpu: "300m", memory: "384Mi" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-consumer
  labels:
    app.kubernetes.io/name: stream-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: stream-consumer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stream-consumer
    spec:
      containers:
        - name: consumer
          image: data-mesh/airflow:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "domains.streaming.consumer"]
          workingDir: /opt/airflow
          envFrom:
            - configMapRef: { name: airflow-config }
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "redpanda:9092"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef: { name: platform-secrets, key: AWS_ACCESS_KEY_ID }
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef: { name: platform-secrets, key: AWS_SECRET_ACCESS_KEY }
          volumeMounts:
            - name: storage
              mountPath: /opt/airflow/storage
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "640Mi" }
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: platform-storage
