# =============================================================================
#  ⚠️  DEV/DEMO ONLY — NÃO use estes valores em produção.
#
#  Estes são os mesmos defaults de desenvolvimento já presentes no repositório
#  (admin/adminpassword, minioadmin). Em produção:
#    - gere um JWT_SECRET_KEY forte e um ADMIN_PASSWORD_HASH bcrypt próprio;
#    - injete via um gerenciador de segredos (External Secrets Operator, Vault,
#      Sealed Secrets, SOPS) em vez de versionar este arquivo;
#    - forneça ANTHROPIC_API_KEY para habilitar o AI Copilot.
#
#  Este arquivo é o Secret padrão da base (apply-able out-of-the-box para demo).
#  Para trocar por segredos reais, faça override no overlay de produção.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
type: Opaque
stringData:
  # API / Auth
  JWT_SECRET_KEY: "dev-only-insecure-secret-change-me"
  ADMIN_USERNAME: "admin"
  # bcrypt hash da senha 'adminpassword'
  ADMIN_PASSWORD_HASH: "$2b$12$Nb3s.jxCa0NDAdZlU.SczO5p23g0e4BwzaxxHaVFLSRYaNVabQoJe"
  # Credencial do AI Copilot (vazio = Copilot desabilitado, API responde 503)
  ANTHROPIC_API_KEY: ""
  # Object storage (MinIO) / S3
  AWS_ACCESS_KEY_ID: "minioadmin"
  AWS_SECRET_ACCESS_KEY: "minioadmin"
  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "minioadmin"
  # Metadados do Airflow (Postgres)
  POSTGRES_USER: "airflow"
  POSTGRES_PASSWORD: "airflow"
  POSTGRES_DB: "airflow"
  # Observabilidade (Grafana admin)
  GRAFANA_ADMIN_USER: "admin"
  GRAFANA_ADMIN_PASSWORD: "admin"
