version: 2

models:
  - name: dim_customers
    description: "Tabela dimensão de clientes limpos e validados vindo do domínio CRM"
    columns:
      - name: customer_id
        description: "Chave primária do cliente"
        tests:
          - unique
          - not_null
      - name: status
        description: "Status do cadastro"
        tests:
          - accepted_values:
              values: ['active', 'inactive']

  - name: fct_sales
    description: "Tabela fato de vendas consolidada vinda do domínio E-Commerce, enriquecida com dados cadastrais"
    columns:
      - name: sale_id
        description: "Chave primária da venda"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Chave estrangeira mapeando para a dimensão de clientes"
        tests:
          - not_null
      - name: amount
        description: "Valor total da venda"

  - name: dm_monthly_kpis
    description: "Mart analítico contendo métricas e agregações financeiras consolidadas por mês"
    columns:
      - name: sales_month
        description: "Mês da agregação"
        tests:
          - unique
          - not_null

  - name: dm_customer_ltv
    description: "Mart de valor do cliente: LTV, ticket médio e segmentação RFM (Recency/Frequency/Monetary) sobre vendas concluídas"
    columns:
      - name: customer_id
        description: "Chave primária do cliente"
        tests:
          - unique
          - not_null
      - name: lifetime_value
        description: "Faturamento total acumulado do cliente"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: rfm_segment
        description: "Segmento comportamental derivado dos quintis RFM"
        tests:
          - not_null
          - accepted_values:
              values: ['Champion', 'Loyal', 'New / Promising', 'At Risk', 'Hibernating', 'Regular']

  - name: dim_products
    description: "Dimensão de produtos derivada do seed do catálogo, usada para busca semântica vetorial"
    columns:
      - name: product_id
        description: "Chave primária sintética do produto"
        tests:
          - unique
          - not_null
      - name: product_name
        description: "Nome do produto"
        tests:
          - unique
          - not_null

  - name: ml_features_pricing
    description: "Base diária de preço/demanda por produto, usada pelo treino do modelo de precificação dinâmica"
    columns:
      - name: product_name
        description: "Nome do produto"
        tests:
          - not_null
      - name: price
        description: "Preço praticado no dia"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: units_sold
        description: "Unidades vendidas no dia"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0

  - name: ft_product_features
    description: "Feature view (offline store) no grão produto-dia: janelas móveis 7d/30d de demanda, receita e posicionamento de preço. Consumida via point-in-time join no treino e materializada no online store (Redis)"
    columns:
      - name: product_name
        description: "Chave de entidade (product)"
        tests:
          - not_null
      - name: feature_date
        description: "Data de referência: valores refletem o conhecimento ao fim deste dia"
        tests:
          - not_null
      - name: units_30d
        description: "Unidades vendidas na janela de 30 dias"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0

  - name: ft_customer_features
    description: "Feature view (offline store) no grão cliente: snapshot de atividade (90d), LTV, recência e segmento RFM. Materializada no online store (Redis) para servir em baixa latência"
    columns:
      - name: customer_id
        description: "Chave de entidade (customer)"
        tests:
          - unique
          - not_null
      - name: feature_timestamp
        description: "Timestamp da última atividade que alimentou o snapshot"
        tests:
          - not_null
      - name: lifetime_value
        description: "Receita acumulada do cliente"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
