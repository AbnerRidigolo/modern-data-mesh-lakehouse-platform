version: '3.8'

x-airflow-common: &airflow-common
  build: .
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: 'fb10a262b9a7187127e2a9b3111f181f='
    AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: 10
    # Custom path mappings for local directories inside containers
    PYTHONPATH: /opt/airflow
    # MinIO / S3 configurations
    AWS_ACCESS_KEY_ID: minioadmin
    AWS_SECRET_ACCESS_KEY: minioadmin
    MINIO_ENDPOINT_URL: http://minio:9000
    AWS_ENDPOINT_URL: http://minio:9000
    AWS_ALLOW_HTTP: "true"
    AWS_S3_ALLOW_UNSAFE_SSL: "true"
    MINIO_ENDPOINT: minio:9000
  volumes:
    - ./dags:/opt/airflow/dags
    - ./storage:/opt/airflow/storage
    - ./domains:/opt/airflow/domains
    - ./analytics_dw:/opt/airflow/analytics_dw
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6389:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"      # API
      - "9001:9001"      # Console UI
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8085:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
      _AIRFLOW_WWW_USER_ROLE: Admin
      _AIRFLOW_WWW_USER_EMAIL: info@example.com
    user: "0:0"
    entrypoint: >
      bash -c "
      airflow db init &&
      airflow users create --username airflow --password airflow --firstname Admin --lastname User --role Admin --email info@example.com || true
      "

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    ports:
      - "5001:5000"
    volumes:
      - ./storage:/storage
    command: mlflow server --backend-store-uri sqlite:////storage/mlflow.db --default-artifact-root /storage/mlruns --host 0.0.0.0 --port 5000

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6335:6333"
    volumes:
      - ./storage/qdrant:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DB_PATH: /code/storage/analytics.duckdb
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MINIO_ENDPOINT_URL: http://minio:9000
      FRONTEND_ORIGINS: http://localhost:8090
      # JWT_SECRET_KEY / ADMIN_PASSWORD_HASH: override via .env for anything beyond local demo use.
    volumes:
      - ./storage:/code/storage
      - ./analytics_dw:/code/analytics_dw
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "8090:80"
    depends_on:
      - api
